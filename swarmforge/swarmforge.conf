# Format: window <role> <agent> <worktree> [task|batch]
# The optional receive mode defaults to task. Use batch for roles that should
# consume all currently queued equal-priority handoffs as one batch.
window specifier   claude specifier   model=claude-opus-4-8   effort=high
window coder       claude coder       model=claude-sonnet-4-6 effort=medium advisor=claude-opus-4-8
window ux-engineer claude ux-engineer model=claude-sonnet-4-6 effort=medium advisor=claude-opus-4-8
window cleaner     claude cleaner     model=claude-sonnet-4-6 effort=medium
window architect   claude architect   model=claude-sonnet-4-6 effort=high   advisor=claude-opus-4-8
window hardender   claude hardender   model=claude-sonnet-4-6 effort=medium advisor=claude-opus-4-8
window QA          claude QA          model=claude-sonnet-4-6 effort=medium advisor=claude-opus-4-8
window integrator  claude integrator  model=claude-sonnet-4-6 effort=low
window curator     claude curator     model=claude-sonnet-4-6 effort=medium
